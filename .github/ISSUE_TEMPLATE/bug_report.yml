name: Bug report
description: Report something that doesn't work or gives an unexpected result
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. A **reproducible example**
        and your **session info** are the two things that let us actually fix
        the problem — please don't skip them.

        Before you start, please
        [search existing issues](https://github.com/ELSA-UNDP/elsar/issues?q=is%3Aissue)
        in case this is already known.

  - type: dropdown
    id: tier
    attributes:
      label: Which part of elsar?
      description: "See the tiers in SUPPORT.md. If you're not sure, pick \"Not sure\"."
      options:
        - "Core — boundaries, planning units, normalisation, zones from local rasters, plotting"
        - "Protected areas — make_protected_areas(from_wdpca = TRUE)"
        - "Earth Engine — the download_* functions"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened, and what did you expect?
      description: Describe the problem. If the result was wrong (rather than an error), say what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reprex
    attributes:
      label: Reproducible example (reprex)
      description: |
        The smallest self-contained code that reproduces the problem. Where you
        can, use the bundled example data (`boundary_dat`, `get_wad_data()`) so we
        can run it without your files or credentials. See https://reprex.tidyverse.org/.
      render: r
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Full error message or warning
      description: Copy the complete message as text (not a screenshot). Leave blank if there was no error.
      render: text
    validations:
      required: false

  - type: textarea
    id: sessioninfo
    attributes:
      label: Session info
      description: "Paste the output of `sessionInfo()` (or `sessioninfo::session_info()`). This tells us your OS and your R / elsar / sf / terra / GDAL versions."
      render: r
    validations:
      required: true

  - type: textarea
    id: setup-check
    attributes:
      label: "Earth Engine only: output of elsar_check_setup()"
      description: If your problem is with the download_* functions, paste the output of `elsar_check_setup()`. Otherwise leave blank.
      render: text
    validations:
      required: false
